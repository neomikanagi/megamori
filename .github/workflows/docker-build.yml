name: Build and Update Rules

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests

      - name: Install Sing-Box v1.11.4
        run: |
          wget https://github.com/SagerNet/sing-box/releases/download/v1.11.4/sing-box_1.11.4_linux_amd64.deb
          sudo dpkg -i sing-box_1.11.4_linux_amd64.deb

      - name: Generate JSON and LIST files
        run: python scripts/generator.py

      - name: Compile SRS binaries
        run: bash scripts/compile-srs.sh

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.srs *.json *.list
          if git diff --cached --quiet; then
            echo "No updates available. Skipping commit."
          else
            git commit -m "chore: auto-update filter rules"
            git pull --rebase origin main
            git push
          fi
